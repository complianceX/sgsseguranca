name: Required Checks (Smoke)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate repo files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
          echo "ok"

